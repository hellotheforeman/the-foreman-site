<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — The Foreman</title>
  <meta name="description" content="Thanks for joining the waitlist for The Foreman." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .thanks-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background: var(--light);
    }
    .thanks-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
    }
    .thanks-icon { font-size: 3.5rem; margin-bottom: 24px; }
    .thanks-card h1 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.8px;
      margin-bottom: 16px;
    }
    .thanks-card p {
      color: var(--mid);
      margin-bottom: 32px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="thanks-page">
    <div class="thanks-card">
      <div class="thanks-icon">🔨</div>
      <h1>You're on the list!</h1>
      <p>Nice one. We'll be in touch as soon as early access opens up. In the meantime, we're building The Foreman for tradespeople like you.</p>
      <a href="/" class="btn btn-primary">Back to the site</a>
    </div>
  </div>
</body>
</html>
